name: Build & Test (multi-platform)

on:
  push:
    branches: [main]
    tags:    ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows binary is built locally (MSVC + sccache) and uploaded manually;
          # CI covers the platforms the maintainer cannot build locally.
          - os: linux-x64
            runner: ubuntu-latest
            arch: x64
          - os: macos-arm64
            runner: macos-14
            arch: arm64
          # macOS Intel (macos-13) deferred — runner pool low-capacity, Apple
          # Silicon is primary. Add back in v0.59.0 if Intel demand surfaces.

    steps:
      - uses: actions/checkout@v4

      # ---- platform-specific deps -------------------------------------------

      - name: Install deps (Linux)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential zlib1g-dev \
            libssl-dev \
            libvulkan-dev glslc spirv-headers spirv-tools

      - name: Install deps (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: |
          brew update
          brew install cmake ninja zlib openssl@3 libomp molten-vk shaderc vulkan-headers vulkan-loader spirv-headers spirv-tools

      - name: Install deps (Windows / MSYS2)
        if: startsWith(matrix.runner, 'windows')
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-vulkan-headers
            mingw-w64-x86_64-vulkan-loader
            mingw-w64-x86_64-shaderc
            mingw-w64-x86_64-spirv-headers
            mingw-w64-x86_64-spirv-tools

      # ---- configure + build ------------------------------------------------

      - name: Configure (Windows)
        if: startsWith(matrix.runner, 'windows')
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DICMG_USE_ONNX=ON \
            -DICMG_USE_TREESITTER=ON \
            -DICMG_USE_ENCRYPTION=ON \
            -DICMG_USE_LLAMA=ON \
            -DICMG_LLAMA_VULKAN=ON

      - name: Configure (Linux)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          # v0.59.0: tree-sitter now vendored from source (CMake auto-fetch
          # v0.24.5) — apt ABI mismatch resolved. Full feature parity.
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DICMG_USE_ONNX=ON \
            -DICMG_USE_TREESITTER=ON \
            -DICMG_USE_ENCRYPTION=ON \
            -DICMG_USE_LLAMA=ON \
            -DICMG_LLAMA_VULKAN=ON

      - name: Configure (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DICMG_USE_ONNX=ON \
            -DICMG_USE_TREESITTER=ON \
            -DICMG_USE_ENCRYPTION=ON \
            -DICMG_USE_LLAMA=ON \
            -DICMG_LLAMA_VULKAN=ON \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DOpenMP_ROOT="$(brew --prefix libomp)" 

      - name: Build (Windows)
        if: startsWith(matrix.runner, 'windows')
        shell: msys2 {0}
        run: cmake --build build --target icmg icmg_test --parallel

      - name: Build (Linux/macOS)
        if: ${{ !startsWith(matrix.runner, 'windows') }}
        run: cmake --build build --target icmg icmg_test --parallel

      # ---- test -------------------------------------------------------------

      - name: Test (Windows)
        if: startsWith(matrix.runner, 'windows')
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Test (Linux/macOS)
        if: ${{ !startsWith(matrix.runner, 'windows') }}
        run: ctest --test-dir build --output-on-failure

      # ---- package (tags only) ----------------------------------------------

      - name: Package (Windows)
        if: startsWith(matrix.runner, 'windows') && startsWith(github.ref, 'refs/tags/v')
        shell: msys2 {0}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p pkg
          cp build/icmg.exe pkg/
          # v0.59.0: vendored tree-sitter is static — only libwinpthread may be
          # needed (std::thread on MinGW posix model). Static-libstdc++ in link
          # options usually pulls it in, but copy is safety net.
          # MinGW runtime + backend deps (openssl, vulkan, zstd) from /mingw64/bin
          for dll in libwinpthread-1.dll libzstd.dll libcrypto-3-x64.dll \
                     libssl-3-x64.dll vulkan-1.dll libstdc++-6.dll libgcc_s_seh-1.dll; do
            cp /mingw64/bin/$dll pkg/ 2>/dev/null || true
          done
          # Build-emitted backend shared libs (ggml / llama / vulkan)
          cp build/bin/*.dll pkg/ 2>/dev/null || true
          cp build/*.dll pkg/ 2>/dev/null || true
          # ONNX Runtime DLLs
          cp third_party/onnxruntime/lib/*.dll pkg/ 2>/dev/null || true
          # Use PowerShell — MSYS2 MINGW64 doesn't bundle 7z by default.
          powershell -NoProfile -Command "Compress-Archive -Path pkg/* -DestinationPath icmg-${VERSION}-win-x64.zip -Force"
          sha256sum "icmg-${VERSION}-win-x64.zip" | awk '{print $1 "  icmg-" v "-win-x64.zip"}' v="$VERSION" > "icmg-${VERSION}-win-x64.zip.sha256"

      - name: Package (Linux)
        if: startsWith(matrix.runner, 'ubuntu') && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p pkg
          cp build/icmg pkg/
          cp build/bin/*.so* pkg/ 2>/dev/null || true
          cp build/*.so* pkg/ 2>/dev/null || true
          cp third_party/onnxruntime/lib/*.so* pkg/ 2>/dev/null || true
          chmod +x pkg/icmg
          tar -C pkg -czf "icmg-${VERSION}-linux-x64.tar.gz" .
          sha256sum "icmg-${VERSION}-linux-x64.tar.gz" > "icmg-${VERSION}-linux-x64.tar.gz.sha256"

      - name: Package (macOS)
        if: startsWith(matrix.runner, 'macos') && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCH="${{ matrix.arch }}"
          mkdir -p pkg
          cp build/icmg pkg/
          cp build/bin/*.dylib pkg/ 2>/dev/null || true
          cp build/*.dylib pkg/ 2>/dev/null || true
          cp third_party/onnxruntime/lib/*.dylib pkg/ 2>/dev/null || true
          chmod +x pkg/icmg
          tar -C pkg -czf "icmg-${VERSION}-macos-${ARCH}.tar.gz" .
          shasum -a 256 "icmg-${VERSION}-macos-${ARCH}.tar.gz" > "icmg-${VERSION}-macos-${ARCH}.tar.gz.sha256"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: icmg-${{ matrix.os }}
          path: |
            icmg-*-${{ matrix.arch }}.zip
            icmg-*-${{ matrix.arch }}.zip.sha256
            icmg-*-${{ matrix.arch }}.tar.gz
            icmg-*-${{ matrix.arch }}.tar.gz.sha256

  publish:
    name: Publish GH Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create / update release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/icmg-*.zip
            dist/icmg-*.zip.sha256
            dist/icmg-*.tar.gz
            dist/icmg-*.tar.gz.sha256
          fail_on_unmatched_files: false
          generate_release_notes: true
