name: Release Signing

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sign:
    name: Sign release artifacts with cosign
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets || true
          ls -la release-assets/ 2>/dev/null || echo "No assets found"

      - name: Sign assets with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in release-assets/*; do
            [ -f "$f" ] || continue
            [[ "$f" == *.sig ]] && continue
            [[ "$f" == *.asc ]] && continue
            echo "Signing: $f"
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              "$f"
          done

      - name: Upload signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bundles=$(ls release-assets/*.bundle 2>/dev/null || true)
          if [ -n "$bundles" ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              release-assets/*.bundle \
              --repo "${{ github.repository }}" \
              --clobber
          fi

      - name: Generate SLSA provenance subject
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release-assets/*
        continue-on-error: true
