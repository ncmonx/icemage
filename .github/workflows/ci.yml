name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-docs:
    name: Validate documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check required files exist
        run: |
          for f in README.md CHANGELOG.md COMMANDS.md CONTRIBUTING.md LICENSE SECURITY.md; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

      - name: Validate workflow YAML syntax
        run: |
          python3 -c "
          import yaml, sys, pathlib
          errors = []
          for f in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'OK: {f}')
              except yaml.YAMLError as e:
                  errors.append(f'FAIL: {f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          "

      - name: Check markdown files are non-empty
        run: |
          for f in README.md CHANGELOG.md COMMANDS.md; do
            lines=$(wc -l < "$f")
            [ "$lines" -gt 10 ] && echo "OK: $f ($lines lines)" || { echo "TOO SHORT: $f"; exit 1; }
          done

      - name: Verify CHANGELOG has recent entry
        run: |
          grep -qE "^## (v0\.[0-9]+|[0-9]{4}-)" CHANGELOG.md \
            && echo "OK: CHANGELOG has versioned entries" \
            || { echo "FAIL: no version entries in CHANGELOG"; exit 1; }

  validate-security:
    name: Validate security configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check SECURITY.md has contact info
        run: |
          grep -qi "email\|contact\|report\|vulnerability" SECURITY.md \
            && echo "OK: SECURITY.md has contact info" \
            || { echo "FAIL: SECURITY.md missing contact info"; exit 1; }

      - name: Verify all workflows declare permissions
        run: |
          python3 -c "
          import yaml, sys, pathlib
          errors = []
          for f in pathlib.Path('.github/workflows').glob('*.yml'):
              doc = yaml.safe_load(f.read_text())
              if not doc: continue
              has_top = 'permissions' in doc
              jobs = doc.get('jobs', {})
              all_jobs = all('permissions' in j for j in jobs.values())
              if not (has_top or all_jobs):
                  errors.append(f'MISSING permissions: {f}')
              else:
                  print(f'OK: {f}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          "
