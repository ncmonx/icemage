name: Bug report
description: Report broken behavior in icmg
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: icmg version
      description: Output of `icmg --version`
      placeholder: "0.33.6"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows (MSYS2 / native)
        - Linux
        - macOS
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands. Include input/config snippets if relevant.
      placeholder: |
        1. cat ~/.icmg/config.json
        2. echo "..." | icmg compress
        3. observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Run with `ICMG_DEBUG=1` if applicable.
      render: shell
